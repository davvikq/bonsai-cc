name: release

# Tag-driven release to PyPI via trusted publishing.
#
# Workflow:
#   1. Maintainer bumps version in pyproject.toml + CHANGELOG.md.
#   2. Commit, then `git tag vX.Y.Z && git push --tags`.
#   3. This workflow runs the full test matrix one more time, builds
#      the sdist + wheel, and publishes to PyPI using OIDC (no API
#      token; trusted-publisher must be pre-configured on PyPI for
#      the `pypi` environment of this repo).
#   4. A GitHub Release is drafted from the matching CHANGELOG entry.

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release in flight

jobs:
  verify:
    name: re-run gates on tagged commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --all-extras
      - run: uv run ruff check src tests scripts
      - run: uv run mypy src/bonsai_cc
      - run: uv run pytest -ra
      - run: uv run python scripts/bench_hook_client.py --runs 50
      - run: uv run python scripts/bench_journal.py --events 1000

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv build
      - run: uv run --with twine twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # OIDC requirement for PyPI trusted publishing.
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/bonsai-cc
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No password / token: PyPI verifies the OIDC token from
          # GitHub Actions against the trusted-publisher config.

  release:
    name: draft GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract version + changelog body
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Pull the section for this version out of CHANGELOG.md.
          # Lines between `## [VERSION]` and the next `## [` heading.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > release_body.md
          echo "--- release body ---"
          cat release_body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.extract.outputs.version }}
          body_path: release_body.md
          draft: true
          files: dist/*
